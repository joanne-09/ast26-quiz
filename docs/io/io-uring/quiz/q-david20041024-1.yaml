author: david20041024
date: 2026-03-19
question: |
  在高效能儲存系統（如使用 io_uring 與 NVMe SSD）的架構設計中，關於 I/O 處理，下列何者最為精確？
options:
  - text: "Fibers 能在單一執行緒中彼此 parallelism（平行運算），而非 concurrency（並行運算），藉此消除頻繁切換核心的開銷。"
    explanation: |
      Fibers 是 User-Space 的協作式協程，提供並行運算，讓單一執行緒可以在等待 I/O 時切換到其他任務，而不是平行運算。
  - text: "在 io_uring 中，因為 Kernel 與 User 共享 SQ/CQ 空間，所以可以實現 SQE 的 Batch submission，減少 syscall 的次數。"
    correct: true
    explanation: |
      通常 io_uring 的 SQ/CQ 是共享，User 可以一次寫入多個 SQE，然後只花費一個 syscall。
  - text: "在 io_uring 中，CQE 的資料結構必須比 SQE 大，因為 CQE 需要儲存大量回傳的資料。"
    explanation: |
      通常 SQE 的資料結構通常為 64 bytes，儲存操作指令等，而 CQE 的資料結構通常為 16 bytes，僅儲存狀態等資訊。
      所以 CQE 的資料結構比 SQE 小，也不用儲存大量回傳的資料。
  - text: "在 io_uring 的 Direct I/O 中，需要將資料額外拷貝到 Kernel 空間，以保證安全性。"
    explanation: |
      不用將資料額外拷貝到 Kernel 空間。
      因為在 io_uring 的 Direct I/O 的核心，就是為了消除 Kernel 與 User 空間之間的資料拷貝開銷，以及避免 Buffer manager 的雙重拷貝。