author: joanne-09
date: 2026-04-27
question: |
  若在 Btrfs 檔案系統過去一個月內，對同一份檔案產生了 S1、S2、S3 三份 snapshot 依時間順序排列。這份檔案在拍完 S1 之後被修改過一次，拍完 S2 之後又被修改過一次；S3 拍攝當下與 S2 之後的修改版相同，之後未再修改。
  現在管理員只刪除 S2，其餘 snapshot 與 live filesystem 都保留。請問以下哪個敘述**正確**描述了刪除 S2 之後的狀態？

options:
  - text: |
      S2 獨佔的 block，其 refcount 歸零，會被立即釋放；但被 S2 與 S1 或 S3 共用的 block 的 refcount 只減 1，不會被釋放。
    correct: true
    explanation: |
      Btrfs 的每個 block 維護一個 reference count。拍 snapshot 時，新舊 tree 共用的 block refcount +1；刪 snapshot 時，沿著被刪 snapshot 的 path 對每個 block refcount -1，只有降到 0 的 block 才真正釋放磁碟空間。

  - text: |
      S2 被刪除後，S1 和 S3 之間不再有連續的 snapshot 鏈，Btrfs 必須重新計算 S1 與 S3 之間所有 block 的 refcount，才能確認哪些可以釋放。
    explanation: |
      Btrfs 的 refcount 是每個 block 各自維護的即時計數，不依賴 snapshot 之間有沒有連續鏈。刪除 S2 時，Btrfs 只需沿著 S2 的 root-to-leaf path 走一遍，對沿途 block 各做 refcount -1，降到 0 就釋放，不需要碰 S1 或 S3 的 path。

  - text: |
      由於 S3 和 live filesystem 都指向 S2 之後修改產生的 block，刪除 S2 後這些 block 的 refcount 從 2 降為 1，但不會被釋放；同時 S2 的 path 沿途也碰過與 S1 共用的 block，這些 block 的 refcount 也各減 1，因此 S1 也會失去部分 block 的存取能力。
    explanation: |
      和 S1 共用的 block，在 S1 拍攝當下 refcount 就已經 +1 給 S1 了。S2 的 path 走過這些 block 時，它們的 refcount 又各自 +1。刪 S2 時對這些 block 做 refcount -1，只是撤銷 S2 當時加上去的那一份，S1 加上去的那份 refcount 依然在，block 不會被釋放，S1 的存取完全不受影響。

  - text: |
      刪除 S2 後，若系統在 refcount 更新到一半時發生 crash，Btrfs 需要靠 journal 來回復正確的 refcount 狀態，否則會有 block refcount 不為 0 但沒有任何 snapshot 指向。
    explanation: |
      Btrfs 的 crash consistency 是由 CoW 的結構性質本身保證的，不是靠 journal。refcount 的更新本身也是透過 CoW 寫到新的 metadata block，再以 atomic root pointer swap 完成的。Crash 只會讓整個操作看起來完全沒發生或看起來完全完成，不存在更新到一半然後需要 journal 回復的狀態。